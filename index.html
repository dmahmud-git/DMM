<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Dewan Mahnaaz Mahmud — Ph.D. researcher in Automatic Control at École Centrale de Nantes. Research on grid-forming inverters, power systems dynamics, and renewable energy integration." />
  <title>Dewan Mahnaaz Mahmud, Publication, Experiences, Projects, Scientific services and distinctions</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- Full-width topbar -->
  <header id="topbar"></header>
  <!-- Full-width mobile drawer -->
  <nav id="mobile-drawer"></nav>

  <!-- Centered page wrapper -->
  <div id="page-wrap">

    <div id="body-row">
      <!-- Sidebar -->
      <aside id="sidebar"></aside>

      <main id="main">

        <h1 class="page-title">About Me</h1>
        <p class="body-text" id="about-bio"></p>

        <h2 class="section-h2">Research Interests</h2>
        <div class="body-text" id="research-interests"></div>

        <h2 class="section-h2">Education</h2>
        <div id="education-section"></div>

        <h2 class="section-h2">News</h2>
        <ul id="news-list" class="news-list"></ul>

      </main>
    </div>

  </div>

  <footer id="footer"></footer>

  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components.js"></script>
  <script>
    Components.init("");

    /* About Me */
    Utils.render("about-bio", SITE.bio);

    /* Research Interests */
    Utils.render("research-interests", SITE.researchInterests);

    /* Education */
    const eduHtml = SITE.cv.education.map(e => {
      let html = `
      <div class="edu-item" style="margin-bottom: 1.5rem; line-height: 1.6;">
        <strong class="edu-degree" style="font-size: 1.05rem; color: var(--text); display: block;">${e.degree}</strong>
        <span style="display: block; color: var(--text);">${e.institution}</span>
        <span style="display: block; color: var(--muted);"><em>${e.year}</em></span>`;

      if (e.details && e.details.length > 0) {
        e.details.forEach(detail => {
          html += `<span style="display: block; color: var(--text);">${detail.key}: ${detail.val}</span>`;
        });
      }

      html += `</div>`;
      return html;
    }).join("");
    Utils.render("education-section", eduHtml);

    /* News */
    const newsHtml = SITE.news.map(n => `
      <li class="news-item">
        <span class="news-date">${n.date}:</span>
        <span class="news-text">${n.text}</span>
      </li>`
    ).join("");
    Utils.render("news-list", newsHtml);
  </script>

</body>

</html>
