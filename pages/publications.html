<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publications — Dewan Mahnaaz Mahmud</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>

  <header id="topbar"></header>
  <nav id="mobile-drawer"></nav>

  <div id="page-wrap">
    <div id="body-row">
      <aside id="sidebar"></aside>

      <!-- ═══════════════════════════════════════════
         PUBLICATIONS — add entries in js/data.js
         under the "publications" array
         ═══════════════════════════════════════════ -->
      <main id="main">
        <h1 class="page-title">Publications</h1>

        <h2 class="section-h2">Journals</h2>
        <div id="journal-list"></div>

        <h2 class="section-h2">Conferences</h2>
        <div id="conference-list"></div>
      </main>
    </div>
  </div><!-- /#page-wrap -->

  <!-- Full-width footer — sits OUTSIDE page-wrap so it spans the whole viewport -->
  <footer id="footer"></footer>

  <script src="../js/data.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/components.js"></script>
  <script>
    Components.init("../");

    const makePubHtml = p => {
      const titleHtml = p.link
        ? `<a href="${p.link}" target="_blank" rel="noopener">${p.title}</a>`
        : p.title;

      return `
      <div class="pub-entry" style="margin-bottom: 1.25rem; font-size: 0.95rem; line-height: 1.6;">
        <div class="pub-citation">
          ${p.authors}, ${p.year}. ${titleHtml}. <em>${p.journal}</em>.
        </div>
      </div>`;
    };

    Utils.render("journal-list", SITE.journals.map(makePubHtml).join(""));
    Utils.render("conference-list", SITE.conferences.map(makePubHtml).join(""));
  </script>

</body>

</html>
