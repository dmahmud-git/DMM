<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scientific services and distinctions — Dewan Mahnaaz Mahmud</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
  <header id="topbar"></header>
  <nav id="mobile-drawer"></nav>

  <div id="page-wrap">
    <div id="body-row">
      <aside id="sidebar"></aside>

      <main id="main">
        <h1 class="page-title">Scientific Services and Distinctions</h1>

        <h2 class="section-h2">Scientific Services</h2>
 
        <h3 class="section-h3">Journals</h3>
        <ul id="reviewer-journals" class="prose"></ul>
 
        <h3 class="section-h3">Conferences</h3>
        <ul id="reviewer-conferences" class="prose"></ul>
 
        <h2 class="section-h2">Distinctions</h2>
        <ul id="awards-list" class="prose"></ul>
      </main>
    </div>
  </div>

  <footer id="footer"></footer>

  <script src="../js/data.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/components.js"></script>
  <script>
    Components.init("../");

    /* Awards & Scholarships */
    const awardsHtml = SITE.cv.awards.map(a =>
      `<li>${a}</li>`
    ).join("");
    Utils.render("awards-list", awardsHtml);


    /* Reviewer — Journals */
    const rjHtml = SITE.reviewerJournals.map(j =>
      `<li>${j}</li>`
    ).join("");
    Utils.render("reviewer-journals", rjHtml);

    /* Reviewer — Conferences */
    const rcHtml = SITE.reviewerConferences.map(c =>
      `<li>${c}</li>`
    ).join("");
    Utils.render("reviewer-conferences", rcHtml);
  </script>
</body>
</html>
